name: Generate Single Topic

on:
  workflow_dispatch:
    inputs:
      topic_id:
        description: 'Topic ID (1-67, see data/topics.csv)'
        required: true
        type: number
      force:
        description: 'Regenerate even if output exists'
        required: false
        default: false
        type: boolean

jobs:
  generate-single:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      # ── 0. Prep ──────────────────────────────────────────────────
      - name: Remove broken submodule config
        run: |
          git config --global --add safe.directory '*'
          if [ -f .gitmodules ]; then
            git submodule deinit --all -f 2>/dev/null || true
          fi

      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate topic
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          LUMA_API_KEY: ${{ secrets.LUMA_API_KEY }}
          KLING_API_KEY: ${{ secrets.KLING_API_KEY }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" == "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/generate_content.py --id ${{ github.event.inputs.topic_id }} $FORCE_FLAG

      - name: Commit result
        run: |
          git config user.name  "Evcarix Bot"
          git config user.email "bot@evcarix.com"
          git add output/
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "🤖 Generated topic #${{ github.event.inputs.topic_id }} [$(date -u +%Y-%m-%d)]"
            git push
          fi
