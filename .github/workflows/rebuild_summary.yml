name: Rebuild Summary

on:
  workflow_dispatch:
  # Auto-rebuild summary after every push to output/
  push:
    paths:
      - 'output/**.json'

jobs:
  summary:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      # ── 0. Prep ──────────────────────────────────────────────────
      - name: Remove broken submodule config
        run: |
          git config --global --add safe.directory '*'
          if [ -f .gitmodules ]; then
            git submodule deinit --all -f 2>/dev/null || true
          fi

      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Rebuild SUMMARY.md
        run: python scripts/generate_content.py --summary

      - name: Commit summary
        run: |
          git config user.name  "Evcarix Bot"
          git config user.email "bot@evcarix.com"
          git add output/SUMMARY.md
          if git diff --cached --quiet; then
            echo "Summary unchanged."
          else
            git commit -m "📄 Updated SUMMARY.md [$(date -u +%Y-%m-%d)]"
            git push
          fi
