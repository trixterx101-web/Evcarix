name: Daily Evcarix Shorts

on:
  schedule:
    - cron: '0 9 * * *' # Her gün Türkiye saatiyle 12:00 (UTC 09:00)
  workflow_dispatch: # Manuel tetikleme için

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        # ImageMagick policy fix (for TextClip)
        sudo sed -i 's/policy domain="path" rights="none" pattern="@\*"/policy domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Setup Secrets
      env:
        YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      run: python src/setup_secrets.py

    - name: Run Main Workflow
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        YOUTUBE_CLIENT_SECRET_FILE: "client_secret.json"
        CI: "true"
      run: python main.py

    - name: Upload Artifacts (Optional)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: daily-video
        path: output/daily_shorts_1.mp4
