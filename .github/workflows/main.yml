name: Daily Evcarix Shorts

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          sudo sed -i 's/policy domain="path" rights="none" pattern="@\*"/policy domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Main Workflow
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_DATA: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CLIENT_SECRET_DATA: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          CI: "true"
        run: |
          # JSON dosyalarını güvenli bir şekilde oluşturma (Tırnak hatası yapmaz)
          python -c "import os; open('token.json', 'w').write(os.environ['YOUTUBE_TOKEN_DATA'])"
          python -c "import os; open('client_secret.json', 'w').write(os.environ['YOUTUBE_CLIENT_SECRET_DATA'])"
          
          # Ana kodu çalıştır
          python main.py

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-video
          path: output/
