name: Daily Evcarix Shorts

on:
  schedule:
    - cron: '0 9 * * *' # Her gün Türkiye saatiyle 12:00
  workflow_dispatch: # Manuel tetikleme için

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        sudo sed -i 's/policy domain="path" rights="none" pattern="@\*"/policy domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Main Workflow
      env:
        # GitHub Secrets kısmındaki isimlerle birebir aynı yapıldı
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        CI: "true"
      run: python main.py

    - name: Upload Artifacts (Yedek Al)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: daily-video
        path: output/
