name: Evcarix Daily Shorts

# TR Saati 08:00 = UTC 07:00  |  TR Saati 16:00 = UTC 13:00  |  TR Saati Pazar 10:00 = UTC 08:00
on:
  schedule:
    - cron: '0 7 * * *'   # TR 08:00 — Trend modu (YouTube'tan ilham)
    - cron: '0 13 * * *'  # TR 16:00 — Auto modu (sistem konusu)
    - cron: '0 8 * * 0'   # Pazar TR 10:00 — Haftalık uzun video (UTC 08:00)
  workflow_dispatch:
    inputs:
      video_type:
        description: 'Video type (short / long)'
        required: true
        default: 'short'
        type: choice
        options:
          - short
          - long
      upload_slot:
        description: 'Upload slot (evening / night)'
        required: false
        default: 'evening'
        type: choice
        options:
          - evening
          - night
      content_mode:
        description: 'Content mode (trend / auto)'
        required: false
        default: 'auto'
        type: choice
        options:
          - trend
          - auto

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Repo ──────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 3. Sistem bağımlılıkları (ffmpeg zorunlu) ────────────────
      - name: Install System Dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-liberation fonts-dejavu fonts-dejavu-core

      # ── 4. Python bağımlılıkları ─────────────────────────────────
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet

      # ── 5. İnsan gibi rastgele bekleme (0-5 dakika) ─────────────
      #     YouTube algoritmasına makine gibi görünmemek için
      # ── 5.1 İçerik geçmişini cache'den yükle ─────────────────────
      #     Run'lar arası konu/başlık tekrarını önlemek için
      - name: Restore Content History Cache
        uses: actions/cache@v4
        with:
          path: |
            content_history.json
            used_topics.json
          key: evcarix-content-history-${{ github.ref_name }}
          restore-keys: |
            evcarix-content-history-

      # ── 5.2 İnsan gibi rastgele bekleme (0-5 dakika) ─────────────
      #     YouTube algoritmasına makine gibi görünmemek için
      - name: Human-like Random Delay
        run: |
          DELAY=$((RANDOM % 300))
          echo "Beklenilen süre: $DELAY saniye ($(($DELAY / 60)) dakika $(($DELAY % 60)) saniye)"
          sleep $DELAY

      # ── 6. Ana workflow ──────────────────────────────────────────
      - name: Run Video Production & Upload
        env:
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2:            ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:            ${{ secrets.GROQ_API_KEY_3 }}
          PEXELS_API_KEY:            ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:           ${{ secrets.PIXABAY_API_KEY }}
          OPENAI_API_KEY:            ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_API_KEY:           ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_REGION:            US
          YOUTUBE_CLIENT_SECRET_FILE: "client_secret.json"
          YOUTUBE_TOKEN_JSON:        ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          # AI Video API Keys (optional)
          KLING_API_KEY:             ${{ secrets.KLING_API_KEY }}
          RUNWAY_API_KEY:            ${{ secrets.RUNWAY_API_KEY }}
          LUMA_API_KEY:              ${{ secrets.LUMA_API_KEY }}
          STABILITY_API_KEY:         ${{ secrets.STABILITY_API_KEY }}
          HF_TOKEN:                  ${{ secrets.HF_TOKEN }}
          FAL_KEY:                   ${{ secrets.FAL_KEY }}
          HAILUO_API_KEY:            ${{ secrets.HAILUO_API_KEY }}
          # Mode: trend (YouTube'tan ilham) veya auto (sistem konusu)
          # cron 07:00 UTC -> trend, cron 13:00 UTC -> auto, cron 08:00 UTC Sunday -> long video
          # FIX: Pazar cron'u (0 8 * * 0) için VIDEO_TYPE=long, UPLOAD_SLOT=SUNDAY_LONG
          # Sabah cron'u (0 7 * * *) için CONTENT_MODE=trend
          # Öğleden sonra cron'u (0 13 * * *) için CONTENT_MODE=auto
          CONTENT_MODE: >-
            ${{ github.event.inputs.content_mode
              || (github.event.schedule == '0 7 * * *' && 'trend')
              || 'auto' }}
          UPLOAD_SLOT: >-
            ${{ github.event.inputs.upload_slot
              || (github.event.schedule == '0 8 * * 0' && 'SUNDAY_LONG')
              || 'evening' }}
          VIDEO_TYPE: >-
            ${{ github.event.inputs.video_type
              || (github.event.schedule == '0 8 * * 0' && 'long')
              || 'short' }}
          PYTHONUNBUFFERED: 1
        run: |
          set -e
          # Kimlik dosyalarını secrets'den oluştur
          python3 -u src/setup_secrets.py
          # Üretim & yükleme
          python3 -u main.py

      # ── 7. İçerik geçmişini cache'e kaydet (başarılı run sonrası) ──
      - name: Save Content History Cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            content_history.json
            used_topics.json
          key: evcarix-content-history-${{ github.ref_name }}

      # ── 8. Çıktıları artifact olarak sakla ───────────────────────
      - name: Save Output Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evcarix-video-${{ github.run_number }}
          path: |
            output/
            daily_plan.json
            content_history.json
            used_topics.json
          retention-days: 14
