name: Evcarix Ultra-HD Pipeline

on:
  schedule:
    - cron: '0 7 * * *'   # TR 10:00 - Trend Mode
    - cron: '0 14 * * *'  # TR 17:00 - Auto Mode
    - cron: '0 5 * * 0'   # Pazar TR 08:00 - Long Video
  workflow_dispatch:
    inputs:
      video_type:
        description: 'short / long'
        required: true
        default: 'short'
        type: choice
        options:
          - short
          - long
      content_mode:
        description: 'video content mode'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - trend
          - electric vehicles
          - artificial intelligence
          - robotics
          - new technologies
          - battery systems
          - smart cities
          - devices of the future

jobs:
  produce-video:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        slot: [1] # Can be expanded to [1, 2] for multiple videos in parallel
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: 1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache APT packages
        uses: actions/cache@v4.2.0
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-${{ runner.os }}-noble

      - name: Install System Dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-liberation \
            fonts-dejavu-core

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Model Cache
        uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}

      - name: Restore History Cache
        uses: actions/cache@v4.2.0
        with:
          path: |
            content_history.json
            used_topics.json
            sequential_state.json
            used_clips.json
            license_log.json
          key: evcarix-history-${{ github.run_id }}
          restore-keys: evcarix-history-

      - name: Run Production
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          CONTENT_MODE: ${{ github.event.inputs.content_mode || (github.event.schedule == '0 7 * * *' && 'trend' || 'auto') }}
          VIDEO_TYPE: ${{ github.event.inputs.video_type || (github.event.schedule == '0 5 * * 0' && 'long' || 'short') }}
        run: |
          python3 src/setup_secrets.py
          python3 main.py

      - name: Save History Cache
        if: success()
        uses: actions/cache/save@v4.2.0
        with:
          path: |
            content_history.json
            used_topics.json
            sequential_state.json
            used_clips.json
            license_log.json
          key: evcarix-history-${{ github.run_id }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4.4.0
        with:
          name: video-output-${{ matrix.slot }}-${{ github.run_number }}
          path: |
            output/
            license_log.json
          retention-days: 7
