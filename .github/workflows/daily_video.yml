name: Evcarix Ultra-HD Pipeline v2

on:
  schedule:
    - cron: '0 7 * * *'    # TR 10:00 — Trend Mode (Short)
    - cron: '0 14 * * *'   # TR 17:00 — Auto Mode  (Short)
    - cron: '0 5 * * 0'    # Pazar TR 08:00 — Long Video
  workflow_dispatch:
    inputs:
      video_type:
        description: 'Video formatı'
        required: true
        default: 'short'
        type: choice
        options:
          - short
          - long
      content_mode:
        description: 'İçerik modu'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - trend
          - educational
          - scientific
          - ev_news
          - electric vehicles
          - artificial intelligence
          - robotics
          - new technologies
          - battery systems
          - smart cities
          - devices of the future
      use_bg_music:
        description: 'Arka plan müziği ekle (ücretsiz, CC-BY)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  produce-video:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        slot: [1]  # [1, 2] yaparak paralel 2 video üretilebilir (dikkat: 2x süre)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: 1
      USE_BG_MUSIC: ${{ github.event.inputs.use_bg_music || 'true' }}

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      # ── 2. Python Kurulum ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. APT Cache ─────────────────────────────────────────────────────────
      - name: Cache APT packages
        uses: actions/cache@v4.2.0
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-fonts-${{ runner.os }}-noble-v2

      # ── 4. Sistem Bağımlılıkları ──────────────────────────────────────────────
      - name: Install System Dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-noto \
            imagemagick \
            libsm6 libxext6 libxrender-dev

      # ── 5. Python Bağımlılıkları ──────────────────────────────────────────────
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt

      # ── 6. HuggingFace Model Cache ────────────────────────────────────────────
      - name: Restore HuggingFace Model Cache
        uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v2
          restore-keys: hf-models-${{ runner.os }}-

      # ── 7. Ses/Müzik Cache ────────────────────────────────────────────────────
      - name: Restore Audio Cache
        uses: actions/cache@v4.2.0
        with:
          path: assets/audio_cache
          key: audio-cache-${{ runner.os }}-v1
          restore-keys: audio-cache-${{ runner.os }}-

      # ── 8. İçerik Geçmişi Cache ───────────────────────────────────────────────
      - name: Restore History Cache
        uses: actions/cache@v4.2.0
        with:
          path: |
            content_history.json
            used_topics.json
            sequential_state.json
            used_clips.json
            used_videos.json
            license_log.json
          key: evcarix-history-v2-${{ github.run_id }}
          restore-keys: |
            evcarix-history-v2-
            evcarix-history-

      # ── 9. Sırlar Ayarla ──────────────────────────────────────────────────────
      - name: Setup Secrets
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        run: python3 src/setup_secrets.py

      # ── 10. Video Üretimi ─────────────────────────────────────────────────────
      - name: ⚡ Production Run (Auto-Monitor)
        timeout-minutes: 50
        env:
          # LLM
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Görsel Kaynaklar
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # Ses (isteğe bağlı — ücretli kaynaklar API key gerektirmez)
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
          # HuggingFace (Kokoro TTS + SDXL)
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # YouTube Upload
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          # Routing
          CONTENT_MODE: ${{ github.event.inputs.content_mode || (github.event.schedule == '0 7 * * *' && 'trend' || 'auto') }}
          VIDEO_TYPE: ${{ github.event.inputs.video_type || (github.event.schedule == '0 5 * * 0' && 'long' || 'short') }}
          UPLOAD_SLOT: ${{ matrix.slot == 1 && 'evening' || 'night' }}
          USE_BG_MUSIC: ${{ github.event.inputs.use_bg_music || 'true' }}
          # GitHub Actions flag
          CI: 'true'
          GITHUB_ACTIONS: 'true'
        run: |
          echo "=== EVCARIX PIPELINE v2 START ==="
          echo "Video Type : $VIDEO_TYPE"
          echo "Content Mode: $CONTENT_MODE"
          echo "BG Music   : $USE_BG_MUSIC"
          python3 main.py

      # ── 11. Geçmiş Cache Kaydet ───────────────────────────────────────────────
      - name: Save History Cache
        if: always()
        uses: actions/cache/save@v4.2.0
        with:
          path: |
            content_history.json
            used_topics.json
            sequential_state.json
            used_clips.json
            used_videos.json
            license_log.json
          key: evcarix-history-v2-${{ github.run_id }}

      # ── 12. Ses Cache Kaydet ──────────────────────────────────────────────────
      - name: Save Audio Cache
        if: always()
        uses: actions/cache/save@v4.2.0
        with:
          path: assets/audio_cache
          key: audio-cache-${{ runner.os }}-v1

      # ── 13. Artifact Yükle ────────────────────────────────────────────────────
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4.4.0
        with:
          name: video-output-slot${{ matrix.slot }}-run${{ github.run_number }}
          path: |
            output/
            license_log.json
          retention-days: 7

      # ── 14. Temizlik Özeti ────────────────────────────────────────────────────
      - name: Pipeline Summary
        if: always()
        run: |
          echo "### Evcarix Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Video Type | $VIDEO_TYPE |" >> $GITHUB_STEP_SUMMARY
          echo "| Content Mode | $CONTENT_MODE |" >> $GITHUB_STEP_SUMMARY
          echo "| BG Music | $USE_BG_MUSIC |" >> $GITHUB_STEP_SUMMARY
          echo "| Run Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          if [ -d output ]; then
            VIDEO_COUNT=$(find output -name "*.mp4" | wc -l)
            echo "| Videos Produced | $VIDEO_COUNT |" >> $GITHUB_STEP_SUMMARY
            find output -name "*.mp4" -exec du -sh {} \; >> $GITHUB_STEP_SUMMARY || true
          fi
          if [ -f license_log.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### License Log" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat license_log.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
